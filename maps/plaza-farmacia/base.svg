<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1792" viewBox="0 0 1280 1792" shape-rendering="crispEdges">
  <defs>
    <pattern id="gray-pavers" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#aeb1ad"/>
      <path d="M0 0H32V32H0Z" fill="none" stroke="#858b89" stroke-width="2"/>
      <path d="M4 8H28M4 24H28" stroke="#c7c9c5" stroke-width="1" opacity=".72"/>
      <path d="M2 30h4M24 2h3" stroke="#777d7b" stroke-width="1" opacity=".55"/>
    </pattern>
    <pattern id="sidewalk" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#c7c5bd"/>
      <path d="M0 16H32M16 0V32" stroke="#9d9e99" stroke-width="2"/>
      <path d="M2 2H14V14H2Z" fill="#d8d6ce" opacity=".65"/>
    </pattern>
    <pattern id="asphalt" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#454b4d"/>
      <path d="M5 8h3m12 13h4M27 6h2M12 28h2" stroke="#60676a" stroke-width="2"/>
      <path d="M2 18h2m12-7h2M25 27h2" stroke="#303638" stroke-width="2"/>
    </pattern>
    <pattern id="unfinished-concrete" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect width="48" height="48" fill="#737977"/>
      <path d="M0 0H48V48H0Z" fill="none" stroke="#555b59" stroke-width="2"/>
      <path d="M7 12h3m24 21h5M17 40h3M41 8h2" stroke="#969b96" stroke-width="2"/>
      <path d="M2 31h7m13-17h5" stroke="#5f6562" stroke-width="2"/>
    </pattern>
    <radialGradient id="lightwell-shadow">
      <stop offset="0" stop-color="#182023" stop-opacity=".72"/>
      <stop offset=".65" stop-color="#30383a" stop-opacity=".28"/>
      <stop offset="1" stop-color="#30383a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="1792" fill="#263732"/>
  <rect x="32" y="32" width="1216" height="1728" fill="#475b50" stroke="#162823" stroke-width="8"/>

  <!-- Plaza gris y aceras laterales. -->
  <rect x="64" y="64" width="1152" height="784" fill="url(#gray-pavers)"/>
  <rect x="32" y="64" width="64" height="1056" fill="url(#sidewalk)"/>
  <rect x="1184" y="64" width="64" height="1056" fill="url(#sidewalk)"/>
  <path d="M96 64V848M1184 64V848" stroke="#777d7b" stroke-width="5"/>

  <!-- Sombra guia de la estructura unica, centrada respecto a rampa y carretera. -->
  <path d="M352 800V320H928V800H1184V640H1120V128H160V800Z" fill="#20302d" opacity=".2"/>

  <!-- Reserva del hueco de luz y terrazas dentro del patio. -->
  <circle cx="640" cy="440" r="124" fill="url(#lightwell-shadow)"/>
  <g fill="none" stroke="#868c89" stroke-width="3" stroke-dasharray="8 8" opacity=".62">
    <rect x="338" y="374" width="154" height="134"/>
    <rect x="788" y="374" width="154" height="134"/>
    <rect x="338" y="594" width="176" height="152"/>
    <rect x="766" y="594" width="176" height="152"/>
  </g>

  <!-- Rampa de dos carriles: su boca ocupa siete baldosas y toca el asfalto. -->
  <path d="M552 560H728L752 848H528Z" fill="#303638" stroke="#777d7c" stroke-width="10"/>
  <path d="M576 566L592 840M704 566L688 840" stroke="#d5d6d0" stroke-width="6"/>
  <path d="M640 584V840" stroke="#bca943" stroke-width="5" stroke-dasharray="24 18"/>
  <path d="M600 688l24-34 24 34h-14v52h-20v-52z" fill="#e6c943"/>
  <path d="M680 760l-24 34-24-34h14v-52h20v52z" fill="#e6c943"/>
  <rect x="520" y="824" width="240" height="24" fill="#363c3e" stroke="#777d7c" stroke-width="6"/>

  <!-- Carretera de dos carriles frente a la plaza. -->
  <rect x="32" y="800" width="1216" height="48" fill="url(#sidewalk)"/>
  <rect x="32" y="848" width="1216" height="208" fill="url(#asphalt)"/>
  <rect x="32" y="1056" width="1216" height="64" fill="url(#sidewalk)"/>
  <path d="M48 952H1232" stroke="#d5cfaa" stroke-width="6" stroke-dasharray="58 38"/>
  <path d="M48 866H1232M48 1038H1232" stroke="#e4e1d1" stroke-width="4" opacity=".82"/>
  <g fill="#ece8d6" opacity=".92">
    <path d="M222 900l42 24-42 24v-14h-72v-20h72z"/>
    <path d="M1058 1002l-42-24 42-24v14h72v20h-72z"/>
  </g>

  <!-- Paso de peatones a la izquierda, sin invadir la boca del garaje. -->
  <g fill="#f1eee1">
    <rect x="296" y="856" width="112" height="20"/>
    <rect x="296" y="888" width="112" height="20"/>
    <rect x="296" y="920" width="112" height="20"/>
    <rect x="296" y="952" width="112" height="20"/>
    <rect x="296" y="984" width="112" height="20"/>
    <rect x="296" y="1016" width="112" height="20"/>
    <rect x="296" y="1060" width="112" height="16"/>
    <rect x="296" y="1088" width="112" height="16"/>
  </g>

  <!-- Solar abandonado al otro lado de la carretera. -->
  <rect x="32" y="1120" width="1216" height="640" fill="url(#unfinished-concrete)"/>
  <rect x="64" y="1280" width="1152" height="480" fill="#3d4243" stroke="#292f30" stroke-width="8"/>
  <path d="M72 1322l148-42 126 34 162-28 150 46 174-48 174 42 134-38 72 22v450H72Z" fill="#4d5352" opacity=".82"/>
  <g fill="#5c6260" stroke="#383e3d" stroke-width="4">
    <path d="M84 1694h154l-28 66H62z"/>
    <path d="M1042 1680h164l28 80h-210z"/>
    <path d="M330 1708h108l-20 52H300z"/>
    <path d="M812 1694h124l24 66H786z"/>
  </g>
  <g fill="#536e50" opacity=".9">
    <path d="M48 1708h150l-16 52H38z"/>
    <path d="M1068 1694h154l18 66h-190z"/>
    <path d="M250 1218h78l-10 34h-88z"/>
    <path d="M926 1214h86l14 40h-112z"/>
  </g>

  <!-- Laterales del vallado; las cuatro piezas PixelLab forman el frente. -->
  <g fill="none" stroke="#8a9190" stroke-width="10">
    <path d="M40 1160V1760"/>
    <path d="M1240 1160V1760"/>
  </g>
  <g stroke="#bec3c2" stroke-width="2" opacity=".75">
    <path d="M32 1176l16 16-16 16 16 16-16 16 16 16-16 16 16 16-16 16 16 16-16 16 16 16-16 16 16 16"/>
    <path d="M1232 1176l16 16-16 16 16 16-16 16 16 16-16 16 16 16-16 16 16 16-16 16 16 16-16 16 16 16"/>
  </g>

  <path d="M32 32H1248V1760H32Z" fill="none" stroke="#162823" stroke-width="8"/>
</svg>
