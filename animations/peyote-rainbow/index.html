<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Peyote mira un arcoíris — 3D</title>
    <script src="assets/vendor/gsap-3.14.2.min.js"></script>
    <script src="assets/vendor/three-0.160.1.min.js"></script>
    <style>
      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #203b50;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #203b50;
      }

      #rainbow-scene {
        position: absolute;
        inset: 0;
        overflow: hidden;
        isolation: isolate;
      }

      #webgl-stage,
      #webgl-canvas {
        position: absolute;
        inset: 0;
        width: 1080px;
        height: 1080px;
      }

      #webgl-stage { z-index: 1; }
      #webgl-canvas { display: block; }

      #warm-wash {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background:
          radial-gradient(circle at 78% 14%, rgba(255, 224, 164, 0.24), transparent 34%),
          radial-gradient(ellipse at 44% 86%, rgba(239, 174, 103, 0.11), transparent 48%);
        mix-blend-mode: screen;
      }

      #grain {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        opacity: 0.08;
        background-image:
          radial-gradient(circle at 20% 30%, rgba(255,255,255,.55) 0 1px, transparent 1.6px),
          radial-gradient(circle at 75% 62%, rgba(18,31,35,.7) 0 1px, transparent 1.7px),
          radial-gradient(circle at 42% 84%, rgba(255,255,255,.32) 0 .8px, transparent 1.4px);
        background-size: 31px 29px, 37px 41px, 23px 27px;
      }

      #vignette {
        position: absolute;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        box-shadow:
          inset 0 0 135px rgba(22, 29, 31, 0.28),
          inset 0 -90px 120px rgba(42, 31, 24, 0.24);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-width="1080"
      data-height="1080"
      data-duration="3"
      data-fps="30"
    >
      <section
        id="rainbow-scene"
        class="clip"
        data-start="0"
        data-duration="3"
        data-track-index="1"
        aria-label="Peyote, modelado en 3D, gira hacia un arcoíris y lo contempla sonriendo"
      >
        <div id="webgl-stage" aria-hidden="true"></div>
        <div id="warm-wash" aria-hidden="true"></div>
        <div id="grain" aria-hidden="true"></div>
        <div id="vignette" aria-hidden="true"></div>
      </section>
    </div>

    <script>
      (() => {
        "use strict";

        if (!window.THREE) throw new Error("Three.js no se ha cargado");
        if (!window.gsap) throw new Error("GSAP no se ha cargado");

        const W = 1080;
        const H = 1080;
        const stage = document.getElementById("webgl-stage");

        const renderer = new THREE.WebGLRenderer({
          alpha: false,
          antialias: true,
          preserveDrawingBuffer: true,
          failIfMajorPerformanceCaveat: false,
          powerPreference: "high-performance",
        });
        renderer.domElement.id = "webgl-canvas";
        renderer.setPixelRatio(1);
        renderer.setSize(W, H, false);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.08;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        stage.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 80);

        function clamp01(value) {
          return Math.max(0, Math.min(1, value));
        }

        function smooth01(value) {
          const v = clamp01(value);
          return v * v * (3 - 2 * v);
        }

        function easeOutCubic(value) {
          const v = clamp01(value);
          return 1 - Math.pow(1 - v, 3);
        }

        function mix(a, b, amount) {
          return a + (b - a) * amount;
        }

        function pulse(time, start, peak, end) {
          if (time <= start || time >= end) return 0;
          if (time < peak) return smooth01((time - start) / (peak - start));
          return 1 - smooth01((time - peak) / (end - peak));
        }

        function seeded(index) {
          const value = Math.sin(index * 127.1 + 311.7) * 43758.5453123;
          return value - Math.floor(value);
        }

        function createSkyTexture() {
          const canvas = document.createElement("canvas");
          canvas.width = 1024;
          canvas.height = 1024;
          const ctx = canvas.getContext("2d");

          const sky = ctx.createLinearGradient(0, 0, 0, 1024);
          sky.addColorStop(0, "#203b50");
          sky.addColorStop(0.48, "#5e8e98");
          sky.addColorStop(0.78, "#9db3a6");
          sky.addColorStop(1, "#d5b17e");
          ctx.fillStyle = sky;
          ctx.fillRect(0, 0, 1024, 1024);

          const sun = ctx.createRadialGradient(790, 170, 20, 790, 170, 390);
          sun.addColorStop(0, "rgba(255,236,190,.9)");
          sun.addColorStop(0.28, "rgba(255,216,155,.48)");
          sun.addColorStop(1, "rgba(255,216,155,0)");
          ctx.fillStyle = sun;
          ctx.fillRect(0, 0, 1024, 1024);

          for (let i = 0; i < 460; i += 1) {
            const x = seeded(i + 10) * 1024;
            const y = seeded(i + 800) * 1024;
            const radius = 0.35 + seeded(i + 1500) * 1.2;
            const alpha = 0.018 + seeded(i + 2100) * 0.035;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = i % 2 === 0
              ? `rgba(255,255,245,${alpha})`
              : `rgba(21,41,49,${alpha})`;
            ctx.fill();
          }

          const texture = new THREE.CanvasTexture(canvas);
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.needsUpdate = true;
          return texture;
        }

        function createStoneBumpTexture() {
          const canvas = document.createElement("canvas");
          canvas.width = 256;
          canvas.height = 256;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "rgb(135,135,135)";
          ctx.fillRect(0, 0, 256, 256);

          for (let i = 0; i < 260; i += 1) {
            const x = seeded(i + 400) * 256;
            const y = seeded(i + 900) * 256;
            const radius = 0.7 + seeded(i + 1600) * 3.8;
            const shade = Math.round(70 + seeded(i + 2400) * 120);
            ctx.beginPath();
            ctx.ellipse(x, y, radius, radius * (0.45 + seeded(i + 3000) * 0.7), 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgb(${shade},${shade},${shade})`;
            ctx.fill();
          }

          const texture = new THREE.CanvasTexture(canvas);
          texture.wrapS = THREE.RepeatWrapping;
          texture.wrapT = THREE.RepeatWrapping;
          texture.repeat.set(2.2, 2.2);
          texture.needsUpdate = true;
          return texture;
        }

        scene.background = createSkyTexture();
        const stoneBump = createStoneBumpTexture();

        const outlineMaterial = new THREE.LineBasicMaterial({
          color: 0x28160c,
          transparent: true,
          opacity: 0.48,
          depthWrite: false,
        });

        function stoneMaterial(color, bumpScale = 0.055) {
          return new THREE.MeshStandardMaterial({
            color,
            roughness: 0.92,
            metalness: 0,
            bumpMap: stoneBump,
            bumpScale,
          });
        }

        const palette = [
          stoneMaterial(0x5a351d),
          stoneMaterial(0x6b4325),
          stoneMaterial(0x7b4e29),
          stoneMaterial(0x8d6033),
          stoneMaterial(0xa2713c),
          stoneMaterial(0xb58349),
          stoneMaterial(0x6f4c2c),
        ];
        const coreMaterial = stoneMaterial(0x3d2616, 0.075);
        const nailMaterial = stoneMaterial(0xb9aa83, 0.025);
        const bronzeMaterial = new THREE.MeshStandardMaterial({
          color: 0xa76c37,
          roughness: 0.7,
          metalness: 0.08,
          bumpMap: stoneBump,
          bumpScale: 0.025,
        });
        const bronzeDarkMaterial = new THREE.MeshStandardMaterial({
          color: 0x5a351d,
          roughness: 0.78,
          metalness: 0.04,
        });

        function roundedRectShape(width, height, radius) {
          const x = -width / 2;
          const y = -height / 2;
          const shape = new THREE.Shape();
          shape.moveTo(x + radius, y);
          shape.lineTo(x + width - radius, y);
          shape.quadraticCurveTo(x + width, y, x + width, y + radius);
          shape.lineTo(x + width, y + height - radius);
          shape.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
          shape.lineTo(x + radius, y + height);
          shape.quadraticCurveTo(x, y + height, x, y + height - radius);
          shape.lineTo(x, y + radius);
          shape.quadraticCurveTo(x, y, x + radius, y);
          return shape;
        }

        function roundedBlock(width, height, depth, radius, material, withOutline = true) {
          const geometry = new THREE.ExtrudeGeometry(
            roundedRectShape(width, height, radius),
            {
              depth,
              steps: 1,
              curveSegments: 8,
              bevelEnabled: true,
              bevelSegments: 3,
              bevelSize: Math.min(radius * 0.34, depth * 0.28),
              bevelThickness: Math.min(radius * 0.3, depth * 0.24),
            },
          );
          geometry.center();
          geometry.computeVertexNormals();
          const mesh = new THREE.Mesh(geometry, material);
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          if (withOutline) {
            const edges = new THREE.LineSegments(
              new THREE.EdgesGeometry(geometry, 34),
              outlineMaterial,
            );
            mesh.add(edges);
          }
          return mesh;
        }

        const characterRoot = new THREE.Group();
        characterRoot.position.set(-1.7, 0, 0);
        scene.add(characterRoot);

        const torsoPivot = new THREE.Group();
        torsoPivot.position.y = 1.15;
        characterRoot.add(torsoPivot);

        const bodyCore = roundedBlock(6, 4.45, 3.7, 0.3, coreMaterial, true);
        bodyCore.position.y = 2.58;
        torsoPivot.add(bodyCore);

        const rowColors = [1, 2, 4, 5, 3, 1];
        const rowY = [0.68, 1.42, 2.16, 2.9, 3.64, 4.34];

        function addFaceBricks(z, backFace) {
          for (let row = 0; row < rowY.length; row += 1) {
            const columns = row % 2 === 0 ? 3 : 4;
            const gap = 0.055;
            const totalWidth = 5.78;
            const brickWidth = (totalWidth - gap * (columns - 1)) / columns;
            for (let column = 0; column < columns; column += 1) {
              const index = row * 8 + column + (backFace ? 200 : 0);
              const jitter = (seeded(index) - 0.5) * 0.055;
              const brick = roundedBlock(
                brickWidth * (0.975 + seeded(index + 500) * 0.04),
                0.665 * (0.96 + seeded(index + 700) * 0.06),
                0.16 + seeded(index + 900) * 0.035,
                0.085,
                palette[(rowColors[row] + column + (backFace ? 1 : 0)) % palette.length],
                true,
              );
              brick.position.set(
                -totalWidth / 2 + brickWidth / 2 + column * (brickWidth + gap),
                rowY[row] + jitter,
                z,
              );
              brick.rotation.z = (seeded(index + 1100) - 0.5) * 0.012;
              if (backFace) brick.rotation.y = Math.PI;
              torsoPivot.add(brick);
            }
          }
        }

        addFaceBricks(1.94, false);
        addFaceBricks(-1.94, true);

        function addSideBricks(x, rightSide) {
          for (let row = 0; row < rowY.length; row += 1) {
            const columns = row % 2 === 0 ? 2 : 3;
            const gap = 0.055;
            const totalDepth = 3.48;
            const brickWidth = (totalDepth - gap * (columns - 1)) / columns;
            for (let column = 0; column < columns; column += 1) {
              const index = 500 + row * 7 + column + (rightSide ? 100 : 0);
              const brick = roundedBlock(
                brickWidth * (0.975 + seeded(index) * 0.045),
                0.665 * (0.96 + seeded(index + 300) * 0.055),
                0.16 + seeded(index + 600) * 0.03,
                0.085,
                palette[(rowColors[row] + column + 2) % palette.length],
                true,
              );
              brick.rotation.y = Math.PI / 2;
              brick.position.set(
                x,
                rowY[row] + (seeded(index + 800) - 0.5) * 0.05,
                -totalDepth / 2 + brickWidth / 2 + column * (brickWidth + gap),
              );
              torsoPivot.add(brick);
            }
          }
        }

        addSideBricks(3.04, true);
        addSideBricks(-3.04, false);

        for (let row = 0; row < 3; row += 1) {
          for (let column = 0; column < 3; column += 1) {
            const index = 900 + row * 3 + column;
            const slab = roundedBlock(
              1.83 * (0.97 + seeded(index) * 0.045),
              1.08 * (0.96 + seeded(index + 100) * 0.06),
              0.2,
              0.1,
              palette[(column + row + 4) % palette.length],
              true,
            );
            slab.rotation.x = Math.PI / 2;
            slab.position.set(-1.9 + column * 1.9, 4.9, -1.15 + row * 1.15);
            slab.rotation.z = (seeded(index + 200) - 0.5) * 0.012;
            torsoPivot.add(slab);
          }
        }

        const feet = [];
        const footPositions = [
          [-2.05, 1.18],
          [2.05, 1.18],
          [-2.05, -1.18],
          [2.05, -1.18],
        ];
        footPositions.forEach((position, index) => {
          const foot = roundedBlock(1.42, 1.28, 1.42, 0.2, palette[index % 2 === 0 ? 2 : 1], true);
          foot.position.set(position[0], 0.66, position[1]);
          foot.rotation.y = (index < 2 ? 1 : -1) * 0.018;
          characterRoot.add(foot);
          feet.push(foot);
        });

        [-2.05, 2.05].forEach((footX) => {
          [-0.27, 0.27].forEach((offset) => {
            const nail = roundedBlock(0.34, 0.32, 0.13, 0.055, nailMaterial, true);
            nail.position.set(footX + offset, 0.39, 1.91);
            characterRoot.add(nail);
          });
        });

        const eyeMaterial = new THREE.MeshPhysicalMaterial({
          color: 0x050403,
          roughness: 0.16,
          metalness: 0,
          clearcoat: 1,
          clearcoatRoughness: 0.1,
        });
        const whiteMaterial = new THREE.MeshBasicMaterial({ color: 0xfffdf5 });
        const grayGlintMaterial = new THREE.MeshBasicMaterial({ color: 0x4f4941 });
        const cheekMaterials = [];
        const primaryGlints = [];
        const secondaryGlints = [];

        function createEye(x) {
          const eyeGroup = new THREE.Group();
          eyeGroup.position.set(x, 1.66, 2.06);
          const eye = new THREE.Mesh(new THREE.SphereGeometry(0.52, 32, 20), eyeMaterial);
          eye.scale.set(0.72, 1, 0.28);
          eye.castShadow = true;
          eyeGroup.add(eye);

          const primary = new THREE.Mesh(new THREE.SphereGeometry(0.145, 20, 12), whiteMaterial);
          primary.position.set(-0.16, 0.2, 0.19);
          primary.scale.set(0.9, 1, 0.5);
          eyeGroup.add(primary);
          primaryGlints.push(primary);

          const secondary = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 10), grayGlintMaterial);
          secondary.position.set(0.16, -0.19, 0.18);
          secondary.scale.set(0.9, 1, 0.45);
          eyeGroup.add(secondary);
          secondaryGlints.push(secondary);

          torsoPivot.add(eyeGroup);
          return eyeGroup;
        }

        createEye(-1.58);
        createEye(1.58);

        [-2.18, 2.18].forEach((x) => {
          const material = new THREE.MeshBasicMaterial({
            color: 0xd5875f,
            transparent: true,
            opacity: 0,
            depthWrite: false,
          });
          const cheek = new THREE.Mesh(new THREE.CircleGeometry(0.23, 28), material);
          cheek.position.set(x, 1.25, 2.105);
          cheek.scale.set(1.35, 0.65, 1);
          torsoPivot.add(cheek);
          cheekMaterials.push(material);
        });

        const smileCurve = new THREE.QuadraticBezierCurve3(
          new THREE.Vector3(-0.56, 1.12, 2.12),
          new THREE.Vector3(0, 0.79, 2.2),
          new THREE.Vector3(0.56, 1.12, 2.12),
        );
        const smileGroup = new THREE.Group();
        const smile = new THREE.Mesh(
          new THREE.TubeGeometry(smileCurve, 28, 0.058, 9, false),
          bronzeDarkMaterial,
        );
        smileGroup.add(smile);
        torsoPivot.add(smileGroup);

        const medallion = new THREE.Group();
        medallion.position.set(0, 3.05, 2.02);
        const outerMedal = new THREE.Mesh(
          new THREE.CylinderGeometry(1.08, 1.08, 0.18, 48),
          bronzeMaterial,
        );
        outerMedal.rotation.x = Math.PI / 2;
        outerMedal.castShadow = true;
        medallion.add(outerMedal);
        const innerMedal = new THREE.Mesh(
          new THREE.CylinderGeometry(0.84, 0.84, 0.21, 48),
          palette[3],
        );
        innerMedal.rotation.x = Math.PI / 2;
        innerMedal.position.z = 0.055;
        medallion.add(innerMedal);
        const medalRing = new THREE.Mesh(
          new THREE.TorusGeometry(0.92, 0.055, 10, 48),
          bronzeDarkMaterial,
        );
        medalRing.position.z = 0.16;
        medallion.add(medalRing);
        for (let i = 0; i < 8; i += 1) {
          const angle = (Math.PI * 2 * i) / 8;
          const rivet = new THREE.Mesh(new THREE.SphereGeometry(0.07, 14, 8), bronzeDarkMaterial);
          rivet.position.set(Math.cos(angle) * 0.74, Math.sin(angle) * 0.74, 0.17);
          rivet.scale.z = 0.45;
          medallion.add(rivet);
        }
        torsoPivot.add(medallion);

        function createLeafSymbol(scale = 1) {
          const group = new THREE.Group();
          const leafMaterial = bronzeDarkMaterial;
          const angles = [0, -0.34, 0.34, -0.68, 0.68, -1.02, 1.02];
          angles.forEach((angle, index) => {
            const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.5, 18, 10), leafMaterial);
            const length = (index === 0 ? 0.58 : index < 3 ? 0.48 : index < 5 ? 0.4 : 0.31) * scale;
            leaf.scale.set(0.13 * scale, length, 0.055 * scale);
            leaf.rotation.z = -angle;
            leaf.position.set(Math.sin(angle) * 0.28 * scale, Math.cos(angle) * 0.25 * scale, 0);
            group.add(leaf);
          });
          const stem = new THREE.Mesh(
            new THREE.BoxGeometry(0.065 * scale, 0.64 * scale, 0.07 * scale),
            leafMaterial,
          );
          stem.position.set(0, -0.24 * scale, 0);
          stem.rotation.z = -0.04;
          group.add(stem);
          return group;
        }

        const frontLeaf = createLeafSymbol(1);
        frontLeaf.position.set(0, 3.05, 2.24);
        torsoPivot.add(frontLeaf);

        const backPlaque = roundedBlock(1.52, 1.36, 0.13, 0.12, bronzeMaterial, true);
        backPlaque.position.set(0, 2.86, -2.015);
        backPlaque.rotation.y = Math.PI;
        torsoPivot.add(backPlaque);
        const backLeaf = createLeafSymbol(0.62);
        backLeaf.position.set(0, 2.86, -2.105);
        backLeaf.rotation.y = Math.PI;
        torsoPivot.add(backLeaf);

        const pebbleGeometry = new THREE.DodecahedronGeometry(0.13, 0);
        for (let i = 0; i < 14; i += 1) {
          const pebble = new THREE.Mesh(pebbleGeometry, palette[(i + 2) % palette.length]);
          pebble.position.set(
            -2.7 + seeded(i + 5100) * 5.4,
            0.55 + seeded(i + 5400) * 4.1,
            2.08 + seeded(i + 5700) * 0.09,
          );
          const size = 0.45 + seeded(i + 6000) * 0.85;
          pebble.scale.set(size, size * 0.65, size * 0.35);
          torsoPivot.add(pebble);
        }

        const groundMaterial = new THREE.MeshStandardMaterial({
          color: 0x73513a,
          roughness: 1,
          metalness: 0,
        });
        const ground = new THREE.Mesh(new THREE.CircleGeometry(10, 96), groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.set(-0.2, -0.025, 0);
        ground.scale.set(1, 1.22, 1);
        ground.receiveShadow = true;
        scene.add(ground);

        const innerGround = new THREE.Mesh(
          new THREE.CircleGeometry(7.2, 96),
          new THREE.MeshStandardMaterial({ color: 0x9a6b43, roughness: 1 }),
        );
        innerGround.rotation.x = -Math.PI / 2;
        innerGround.position.set(-0.6, -0.005, 0.4);
        innerGround.scale.set(1, 1.18, 1);
        innerGround.receiveShadow = true;
        scene.add(innerGround);

        for (let i = 0; i < 12; i += 1) {
          const stone = new THREE.Mesh(
            new THREE.DodecahedronGeometry(0.1 + seeded(i + 6600) * 0.12, 0),
            palette[(i + 1) % palette.length],
          );
          stone.position.set(
            -4.7 + seeded(i + 7000) * 8.8,
            0.08,
            -1.7 + seeded(i + 7300) * 4.9,
          );
          stone.scale.y = 0.6;
          stone.castShadow = true;
          scene.add(stone);
        }

        const rainbowColors = [
          0xcc695b,
          0xdf914a,
          0xdec05a,
          0x78a071,
          0x529493,
          0x5a76a2,
          0x886d97,
        ];
        const rainbowGroup = new THREE.Group();
        rainbowGroup.position.set(2.65, 2.7, -5.6);
        scene.add(rainbowGroup);
        const rainbowArcs = [];
        rainbowColors.forEach((color, index) => {
          const geometry = new THREE.TorusGeometry(4.85 - index * 0.31, 0.135, 12, 180, Math.PI);
          const material = new THREE.MeshStandardMaterial({
            color,
            emissive: color,
            emissiveIntensity: 0.12,
            roughness: 0.62,
            metalness: 0,
            transparent: true,
            opacity: 0,
          });
          const arc = new THREE.Mesh(geometry, material);
          arc.castShadow = false;
          arc.receiveShadow = false;
          rainbowGroup.add(arc);
          rainbowArcs.push({ mesh: arc, geometry, material, indexCount: geometry.index.count });
        });

        function makeCloud(material, scale, basePosition) {
          const group = new THREE.Group();
          group.position.copy(basePosition);
          const pieces = [
            [-0.8, 0, 0, 0.78],
            [-0.3, 0.2, 0.08, 1.0],
            [0.25, 0.13, 0, 0.9],
            [0.72, -0.03, 0.04, 0.66],
            [0, -0.18, 0.1, 1.05],
          ];
          pieces.forEach((piece) => {
            const puff = new THREE.Mesh(new THREE.SphereGeometry(0.72, 20, 14), material);
            puff.position.set(piece[0], piece[1], piece[2]);
            puff.scale.set(piece[3] * 1.25, piece[3] * 0.72, piece[3] * 0.68);
            group.add(puff);
          });
          group.scale.setScalar(scale);
          scene.add(group);
          return group;
        }

        const cloudMaterialLeft = new THREE.MeshStandardMaterial({
          color: 0xe9e5d8,
          roughness: 0.96,
          transparent: true,
          opacity: 0.92,
        });
        const cloudMaterialRight = cloudMaterialLeft.clone();
        cloudMaterialRight.color.setHex(0xf5ead2);
        const cloudMaterialFar = cloudMaterialLeft.clone();
        cloudMaterialFar.color.setHex(0xa9bab6);
        cloudMaterialFar.opacity = 0.54;

        const cloudLeft = makeCloud(cloudMaterialLeft, 1.32, new THREE.Vector3(-5.25, 1.05, -4.1));
        const cloudRight = makeCloud(cloudMaterialRight, 1.42, new THREE.Vector3(6.35, 1.75, -4.8));
        const cloudFar = makeCloud(cloudMaterialFar, 0.78, new THREE.Vector3(4.8, 6.65, -7.4));

        const sunMaterial = new THREE.MeshBasicMaterial({
          color: 0xffe4a8,
          transparent: true,
          opacity: 0.42,
          depthWrite: false,
        });
        const sunDisc = new THREE.Mesh(new THREE.SphereGeometry(0.72, 32, 20), sunMaterial);
        sunDisc.position.set(6.55, 7.85, -7.7);
        scene.add(sunDisc);

        const moteMaterial = new THREE.MeshBasicMaterial({
          color: 0xffe2a7,
          transparent: true,
          opacity: 0,
          depthWrite: false,
        });
        const motes = [];
        for (let i = 0; i < 8; i += 1) {
          const mote = new THREE.Mesh(
            new THREE.SphereGeometry(0.035 + (i % 3) * 0.012, 12, 8),
            moteMaterial.clone(),
          );
          mote.userData.base = new THREE.Vector3(
            -0.2 + seeded(i + 8100) * 5.4,
            1.4 + seeded(i + 8400) * 4.0,
            -0.8 + seeded(i + 8700) * 2.0,
          );
          mote.position.copy(mote.userData.base);
          scene.add(mote);
          motes.push(mote);
        }

        const hemisphere = new THREE.HemisphereLight(0xc8e5ef, 0x5a3621, 1.25);
        scene.add(hemisphere);
        const keyLight = new THREE.DirectionalLight(0xffd79a, 2.1);
        keyLight.position.set(-4.5, 8.5, 7);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.set(2048, 2048);
        keyLight.shadow.camera.left = -9;
        keyLight.shadow.camera.right = 9;
        keyLight.shadow.camera.top = 10;
        keyLight.shadow.camera.bottom = -4;
        keyLight.shadow.camera.near = 0.5;
        keyLight.shadow.camera.far = 30;
        scene.add(keyLight);
        const fillLight = new THREE.DirectionalLight(0x86b9c7, 0.68);
        fillLight.position.set(6, 4, 4);
        scene.add(fillLight);
        const rainbowLight = new THREE.PointLight(0xd99bd5, 0, 18, 2);
        rainbowLight.position.set(3.8, 5.2, 3.5);
        scene.add(rainbowLight);

        const cameraFocus = new THREE.Vector3(0.15, 3.35, -0.45);

        function applyPose(time) {
          const orbit = smooth01((time - 0.08) / 1.18);
          const finalDolly = smooth01((time - 1.3) / 1.7);
          const theta = THREE.MathUtils.degToRad(mix(145, 24, orbit));
          const radius = mix(16.9, 15.4, orbit) - finalDolly * 0.18;
          const cameraY = mix(6.25, 6.55, orbit) + finalDolly * 0.06;
          camera.position.set(
            cameraFocus.x + Math.sin(theta) * radius,
            cameraY,
            Math.cos(theta) * radius,
          );
          camera.lookAt(cameraFocus);

          const look = smooth01((time - 1.02) / 0.67);
          const settleBreath = time > 2.15 ? Math.sin((time - 2.15) * Math.PI * 1.15) * 0.006 : 0;
          torsoPivot.rotation.x = -0.205 * look + settleBreath;
          torsoPivot.rotation.z = -0.052 * look;
          torsoPivot.rotation.y = -0.045 * look;

          const squash = pulse(time, 1.5, 1.63, 1.74);
          const hop = pulse(time, 1.66, 1.82, 2.0);
          const land = pulse(time, 1.93, 2.05, 2.19);
          characterRoot.position.y = hop * 0.24 - land * 0.025;
          characterRoot.scale.set(
            1 + squash * 0.032 - hop * 0.012 + land * 0.028,
            1 - squash * 0.042 + hop * 0.026 - land * 0.036 + settleBreath,
            1 + squash * 0.026 - hop * 0.008 + land * 0.023,
          );

          const happy = easeOutCubic((time - 1.14) / 0.7);
          smileGroup.scale.set(1 + happy * 0.26, 1 + happy * 0.075, 1);
          cheekMaterials.forEach((material) => {
            material.opacity = happy * 0.3;
          });
          primaryGlints.forEach((glint, index) => {
            glint.position.x = -0.16 + happy * (0.35 + index * 0.014);
            glint.position.y = 0.2 + happy * 0.2;
          });
          secondaryGlints.forEach((glint) => {
            glint.position.x = 0.16 + happy * 0.08;
            glint.position.y = -0.19 + happy * 0.14;
          });

          const split = smooth01((time - 0.22) / 1.08);
          cloudLeft.position.x = -5.25 - split * 0.92;
          cloudRight.position.x = 6.35 + split * 1.04;
          cloudFar.position.x = 4.8 + time * 0.11;
          cloudFar.position.y = 6.65 + Math.sin(time * 1.4) * 0.05;

          rainbowArcs.forEach((arc, index) => {
            const localReveal = smooth01((time - 0.62 - index * 0.035) / 0.88);
            const triangleCount = Math.floor((arc.indexCount * localReveal) / 3) * 3;
            arc.geometry.setDrawRange(0, Math.max(0, triangleCount));
            arc.material.opacity = localReveal * 0.91;
            const gleam = pulse(time, 1.48 + index * 0.022, 1.75 + index * 0.02, 2.05 + index * 0.018);
            arc.material.emissiveIntensity = 0.12 + gleam * 0.46;
          });

          const lightArrival = smooth01((time - 0.38) / 1.1);
          sunMaterial.opacity = 0.2 + lightArrival * 0.38;
          keyLight.intensity = 1.8 + lightArrival * 1.0;
          hemisphere.intensity = 1.08 + lightArrival * 0.42;
          rainbowLight.intensity = happy * 0.9;

          const moteIn = smooth01((time - 1.35) / 0.48);
          motes.forEach((mote, index) => {
            mote.material.opacity = moteIn * (0.32 + (index % 3) * 0.09);
            mote.position.x = mote.userData.base.x + Math.sin(time * 1.3 + index * 0.8) * 0.06;
            mote.position.y = mote.userData.base.y + Math.sin(time * 1.8 + index * 0.55) * 0.09;
          });
        }

        function renderAt(rawTime) {
          const time = Math.max(0, Math.min(3, Number(rawTime) || 0));
          applyPose(time);
          renderer.setRenderTarget(null);
          renderer.setViewport(0, 0, W, H);
          renderer.clear(true, true, true);
          renderer.render(scene, camera);
          renderer.getContext().finish();
        }

        window.addEventListener("hf-seek", (event) => {
          renderAt(event.detail.time);
        });

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.fromTo("#warm-wash", { opacity: 0.18 }, { opacity: 0.78, duration: 1.45, ease: "power2.out" }, 0.25);
        tl.to("#warm-wash", { opacity: 0.55, duration: 1.3, ease: "sine.inOut", overwrite: "auto" }, 1.55);
        tl.fromTo("#grain", { opacity: 0.055 }, { opacity: 0.09, duration: 3, ease: "sine.inOut" }, 0);
        tl.fromTo("#vignette", { opacity: 0.82 }, { opacity: 1, duration: 3, ease: "power1.inOut" }, 0);
        window.__timelines["main"] = tl;

        renderer.compile(scene, camera);
        tl.seek(0);
        renderAt(window.__hfThreeTime || 0);
      })();
    </script>
  </body>
</html>
